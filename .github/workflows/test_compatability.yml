name: Test CADET version compatibility

on:
  workflow_dispatch:
    inputs:
      cadet_core_version:
        description: "cadet-core version to install from TestPyPI (empty = latest)"
        required: false
        default: ""
      cadet_process_ref:
        description: "cadet-process git ref (branch/tag/sha)"
        required: false
        default: "dev"
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout cadet-process
        uses: actions/checkout@v4
        with:
          repository: fau-advanced-separations/CADET-Process
          ref: ${{ inputs.cadet_process_ref }}
          path: cadet-process

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install -U pip setuptools wheel

      - name: Install cadet-core from TestPyPI
        shell: bash
        run: |
          set -euxo pipefail
          if [ -n "${{ inputs.cadet_core_version }}" ]; then
            python -m pip install \
              --index-url https://test.pypi.org/simple \
              --extra-index-url https://pypi.org/simple \
              "cadet-core==${{ inputs.cadet_core_version }}"
          else
            python -m pip install \
              --index-url https://test.pypi.org/simple \
              --extra-index-url https://pypi.org/simple \
              cadet-core
          fi

          python -c "import cadet_core; print('cadet-core', cadet_core.__version__)"
          python -c "import cadet_core; print('cadet-cli', cadet_core.get_cadet_binary())"

      - name: Put cadet_core/bin on PATH (bundled binaries/DLLs)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          from pathlib import Path
          import cadet_core

          bindir = Path(cadet_core.__file__).resolve().parent / "bin"
          print("cadet_core bin dir:", bindir)

          with open(os.environ["GITHUB_PATH"], "a") as f:
              f.write(str(bindir) + "\n")
          PY

      - name: Verify CADET binary is runnable
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            which cadet-cli || true
          fi
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path
          import cadet_core

          exe = Path(cadet_core.get_cadet_binary())
          bindir = exe.parent

          env = os.environ.copy()
          env["PATH"] = str(bindir) + os.pathsep + env.get("PATH", "")

          print("Using CADET binary:", exe)
          print("Prepended to PATH:", bindir)

          subprocess.check_call([str(exe), "--version"], env=env)
          PY


      - name: Install cadet-process in testing config
        shell: bash
        run: |
          set -euxo pipefail
          cd cadet-process

          python -m pip install -e ".[testing]" || python -m pip install -e "."
          python -m pip install -U pytest

          python -c "import sys; print('python:', sys.executable); print(sys.version)"

      - name: Run pytest (reduced set on macOS)
        shell: bash
        run: |
          set -euxo pipefail
          cd cadet-process

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            python -m pytest tests -m "not slow" --durations=0 \
              --ignore=tests/test_cache.py \
              --ignore=tests/test_difference.py \
              --ignore=tests/test_individual.py \
              --ignore=tests/test_optimization_problem.py \
              --ignore=tests/test_optimization_results.py \
              --ignore=tests/test_optimizer_behavior.py \
              --ignore=tests/test_parallelization_adapter.py \
              --ignore=tests/test_population.py \
              --ignore=tests/test_pymoo.py
          else
            python -m pytest tests -m "not slow" --durations=0
          fi

      - name: Run pytest (full set on macOS, expected to error due to psutil)
        if: runner.os == 'macOS'
        shell: bash
        continue-on-error: true
        run: |
          set -euxo pipefail
          cd cadet-process
          python -m pytest tests -m "not slow" --durations=0



